<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    *{
      margin: 0;
      padding: 0;
    }
    .container{
        background-color: aqua;
        padding: 20px;

        color: red;
        width: 500px;
      text-align: center;
       }
       .flexcontainer{
        background-color: aqua;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
       }
       .box1{
        width: 100px;
        height: 100px;
        background-color: red;
        margin: 10px;

       }
       .head1{
        color:blueviolet;
        font-size: 25px;
        font-weight: 100;
        font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        background-color: black;
        margin: 20px 50px;
        padding: 20px 50px;
        border: 3px dotted red;
       }
</style>
<body>
    <h1 
    class="head1"
    >This is my text</h1>

   <div class="container">
    <h1>Welcome to my website</h1>
    <p>This is a sample paragraph with some text</p>
   </div> 

   <div class="flexcontainer">
    <div class="box1"></div>
    <div class="box1"></div>
    <div class="box1"></div>
<h1>Text1</h1>
<h1>Text2</h1>

   </div>

</body>
</html>
